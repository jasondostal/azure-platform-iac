# ──────────────────────────────────────────────────────────────────────────────
# azure-platform-iac / pipelines / templates / deploy-environment.yml
#
# Deploy an app (and optionally its Bicep infra) to a single environment.
# Emits a STAGE — consume it once per environment under the pipeline's `stages:`.
#
# BUILD ONCE, DEPLOY MANY: there is NO branch gating. One pipeline run (off
# `main`) builds a single artifact, then promotes that SAME artifact through a
# LINEAR chain of these stages — dev → qa → stage → prod — wired by `dependsOn`.
# Promotion is gated by ADO Environment approvals (`adoEnvironment`), configured
# in the ADO UI. Which env this stage targets is a pure config choice (the
# variable group + bicepparam it selects), not a function of the git branch.
#
# Parameters:
#   environment:        dev | qa | staging | prod   (logical name → stage id)
#   adoEnvironment:     ADO Environment resource for approvals (default: environment)
#   dependsOn:          stage(s) this deploy waits on — the PREVIOUS env in the
#                       promotion chain (e.g. qa dependsOn ['Deploy_dev'])
#   variableGroups:     ADO Library variable groups to import (default: [])
#   serviceConnection:  Azure RM service connection name
#   appName:            App Service / Function App name
#   targetType:         web | function | container
#   artifactName:       build artifact to deploy
#   deployInfra:        also deploy Bicep infra in this stage (default: false —
#                       infra is normally owned by infra-pipeline.yml)
#   infraTemplate:      path to the Bicep main template
#   infraParams:        path to the .bicepparam for this environment
# ──────────────────────────────────────────────────────────────────────────────
parameters:
  - name: environment
    type: string
    values:
      - dev
      - qa
      - staging
      - prod
  - name: adoEnvironment
    type: string
    default: ''
  - name: dependsOn
    type: object
    default: []
  - name: variableGroups
    type: object
    default: []
  - name: serviceConnection
    type: string
  - name: appName
    type: string
  - name: targetType
    type: string
    default: 'web'
    values:
      - web
      - function
      - container
  - name: artifactName
    type: string
    default: 'drop'
  - name: deployInfra
    type: boolean
    default: false
  - name: infraTemplate
    type: string
    default: 'infra/main.bicep'
  - name: infraParams
    type: string
    default: ''
  - name: location
    type: string
    default: 'eastus'
  - name: pool
    type: object
    # Default: Microsoft-hosted. Override with { name: '<self-hosted-pool>' } to
    # run on a VNet-integrated self-hosted agent — REQUIRED when deploying into
    # private-endpoint resources (Microsoft-hosted agents can't reach them).
    default:
      vmImage: 'ubuntu-latest'

stages:
  - stage: Deploy_${{ parameters.environment }}
    displayName: 'Deploy → ${{ upper(parameters.environment) }}'
    dependsOn: ${{ parameters.dependsOn }}
    ${{ if gt(length(parameters.variableGroups), 0) }}:
      variables:
        - ${{ each vg in parameters.variableGroups }}:
          - group: ${{ vg }}
    jobs:
      - deployment: Deploy_${{ parameters.environment }}
        displayName: 'Deploy ${{ parameters.appName }} → ${{ parameters.environment }}'
        environment: ${{ coalesce(parameters.adoEnvironment, parameters.environment) }}
        pool: ${{ parameters.pool }}
        strategy:
          runOnce:
            deploy:
              steps:
                # ── Deploy Infrastructure (Bicep) — opt-in ──────────────────
                - ${{ if eq(parameters.deployInfra, true) }}:
                  - checkout: self
                  - checkout: platform
                  - task: AzureCLI@2
                    displayName: 'Deploy Bicep infra (${{ parameters.environment }})'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        az deployment sub create \
                          --location ${{ parameters.location }} \
                          --template-file ${{ parameters.infraTemplate }} \
                          --parameters ${{ parameters.infraParams }}

                # ── Deploy App ──────────────────────────────────────────────
                - ${{ if eq(parameters.targetType, 'web') }}:
                  - task: AzureWebApp@1
                    displayName: 'Deploy to App Service'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      appName: '${{ parameters.appName }}'
                      package: '$(Pipeline.Workspace)/${{ parameters.artifactName }}/**/*.zip'

                - ${{ if eq(parameters.targetType, 'function') }}:
                  - task: AzureFunctionApp@1
                    displayName: 'Deploy to Function App'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      appName: '${{ parameters.appName }}'
                      package: '$(Pipeline.Workspace)/${{ parameters.artifactName }}/**/*.zip'

                - ${{ if eq(parameters.targetType, 'container') }}:
                  - task: AzureWebAppContainer@1
                    displayName: 'Deploy container to App Service'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      appName: '${{ parameters.appName }}'
                      containers: '${{ parameters.appName }}:$(Build.BuildId)'
