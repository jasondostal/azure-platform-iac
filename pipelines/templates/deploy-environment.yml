# ──────────────────────────────────────────────────────────────────────────────
# azure-platform-iac / pipelines / templates / deploy-environment.yml
#
# Deploy an app (and optionally its Bicep infra) to a single environment.
# Emits a STAGE — consume it once per environment under the pipeline's `stages:`.
#
# Branch gating: pass `branch` (e.g. refs/heads/dev) and the stage only runs on
# that branch. Approval gating: the deployment job targets an ADO Environment
# (`adoEnvironment`), where checks/approvals are configured in the ADO UI.
#
# Parameters:
#   environment:        dev | qa | staging | prod   (logical name → stage id)
#   adoEnvironment:     ADO Environment resource for approvals (default: environment)
#   branch:             refs/heads/* to gate on; '' = run on any branch
#   dependsOn:          stage(s) this deploy waits on (default: [])
#   variableGroups:     ADO Library variable groups to import (default: [])
#   serviceConnection:  Azure RM service connection name
#   appName:            App Service / Function App name
#   targetType:         web | function | container
#   artifactName:       build artifact to deploy
#   deployInfra:        also deploy Bicep infra in this stage (default: false —
#                       infra is normally owned by infra-pipeline.yml)
#   infraTemplate:      path to the Bicep main template
#   infraParams:        path to the .bicepparam for this environment
# ──────────────────────────────────────────────────────────────────────────────
parameters:
  - name: environment
    type: string
    values:
      - dev
      - qa
      - staging
      - prod
  - name: adoEnvironment
    type: string
    default: ''
  - name: branch
    type: string
    default: ''
  - name: dependsOn
    type: object
    default: []
  - name: variableGroups
    type: object
    default: []
  - name: serviceConnection
    type: string
  - name: appName
    type: string
  - name: targetType
    type: string
    default: 'web'
    values:
      - web
      - function
      - container
  - name: artifactName
    type: string
    default: 'drop'
  - name: deployInfra
    type: boolean
    default: false
  - name: infraTemplate
    type: string
    default: 'infra/main.bicep'
  - name: infraParams
    type: string
    default: ''

stages:
  - stage: Deploy_${{ parameters.environment }}
    displayName: 'Deploy → ${{ upper(parameters.environment) }}'
    dependsOn: ${{ parameters.dependsOn }}
    ${{ if ne(parameters.branch, '') }}:
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], '${{ parameters.branch }}'))
    ${{ if gt(length(parameters.variableGroups), 0) }}:
      variables:
        - ${{ each vg in parameters.variableGroups }}:
          - group: ${{ vg }}
    jobs:
      - deployment: Deploy_${{ parameters.environment }}
        displayName: 'Deploy ${{ parameters.appName }} → ${{ parameters.environment }}'
        environment: ${{ coalesce(parameters.adoEnvironment, parameters.environment) }}
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                # ── Deploy Infrastructure (Bicep) — opt-in ──────────────────
                - ${{ if eq(parameters.deployInfra, true) }}:
                  - checkout: self
                  - checkout: platform
                  - task: AzureCLI@2
                    displayName: 'Deploy Bicep infra (${{ parameters.environment }})'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        az deployment sub create \
                          --location eastus \
                          --template-file ${{ parameters.infraTemplate }} \
                          --parameters ${{ parameters.infraParams }}

                # ── Deploy App ──────────────────────────────────────────────
                - ${{ if eq(parameters.targetType, 'web') }}:
                  - task: AzureWebApp@1
                    displayName: 'Deploy to App Service'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      appName: '${{ parameters.appName }}'
                      package: '$(Pipeline.Workspace)/${{ parameters.artifactName }}/**/*.zip'

                - ${{ if eq(parameters.targetType, 'function') }}:
                  - task: AzureFunctionApp@1
                    displayName: 'Deploy to Function App'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      appName: '${{ parameters.appName }}'
                      package: '$(Pipeline.Workspace)/${{ parameters.artifactName }}/**/*.zip'

                - ${{ if eq(parameters.targetType, 'container') }}:
                  - task: AzureWebAppContainer@1
                    displayName: 'Deploy container to App Service'
                    inputs:
                      azureSubscription: '${{ parameters.serviceConnection }}'
                      appName: '${{ parameters.appName }}'
                      containers: '${{ parameters.appName }}:$(Build.BuildId)'
