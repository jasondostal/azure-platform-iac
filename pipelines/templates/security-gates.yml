# ──────────────────────────────────────────────────────────────────────────────
# azure-platform-iac / pipelines / templates / security-gates.yml
#
# Shared security gates consumed by every app pipeline.
# Add a scanner here → every team gets it on next build.
#
# Parameters:
#   workDir: where to run scans (default: $(Build.SourcesDirectory))
#   dotnet:  include .NET-specific gates (dotnet format, NuGet vuln). Set false
#            for python/go/node archetypes so they don't run no-op .NET steps.
#
# Language-agnostic gates (gitleaks, Semgrep, Trivy) always run.
# ──────────────────────────────────────────────────────────────────────────────
parameters:
  - name: workDir
    type: string
    default: $(Build.SourcesDirectory)
  - name: dotnet
    type: boolean
    default: true

steps:
  # ── Format / Lint (.NET) ─────────────────────────────────────────────────────
  - ${{ if eq(parameters.dotnet, true) }}:
    - script: dotnet format --verify-no-changes --verbosity diagnostic
      displayName: 'Lint: dotnet format'
      condition: succeededOrFailed()
      continueOnError: true
      workingDirectory: ${{ parameters.workDir }}

  # ── Secret Detection ───────────────────────────────────────────────────────
  - script: |
      GITLEAKS_VERSION=v8.21.2
      # The release TAG has a leading 'v' (v8.21.2) but the asset FILENAME does
      # not (gitleaks_8.21.2_linux_x64.tar.gz). Reusing the tag for both 404s.
      GITLEAKS_FILE_VERSION=${GITLEAKS_VERSION#v}
      curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_FILE_VERSION}_linux_x64.tar.gz" | tar xz -C /tmp
      /tmp/gitleaks detect --source ${{ parameters.workDir }} --verbose
    displayName: 'Security: gitleaks (HARD)'
    continueOnError: false
    workingDirectory: ${{ parameters.workDir }}

  # ── Dependency Scan (NuGet, .NET) ────────────────────────────────────────────
  - ${{ if eq(parameters.dotnet, true) }}:
    - script: dotnet list package --vulnerable --include-transitive 2>/dev/null || true
      displayName: 'Security: NuGet vulnerability scan'
      condition: succeededOrFailed()
      continueOnError: true
      workingDirectory: ${{ parameters.workDir }}

  # ── SAST (Semgrep) ─────────────────────────────────────────────────────────
  - script: |
      pip install semgrep --quiet 2>/dev/null || true
      semgrep --config auto --error ${{ parameters.workDir }} 2>/dev/null || true
    displayName: 'Security: Semgrep SAST'
    condition: succeededOrFailed()
    continueOnError: true
    workingDirectory: ${{ parameters.workDir }}

  # ── Filesystem Scan (Trivy) ────────────────────────────────────────────────
  - script: |
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.57.1
      trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 0 ${{ parameters.workDir }}
    displayName: 'Security: Trivy FS scan'
    condition: succeededOrFailed()
    continueOnError: true
    workingDirectory: ${{ parameters.workDir }}
